    <meta name="description" content="We help you find, manage, and secure properties with confidence, acting as the trusted bridge between property owners and buyers.">

<section class=" min-h-screen flex items-center justify-center px-6">

            <!-- Icon -->
            <div class="w-20 h-20 mx-auto mb-6 rounded-full flex items-center justify-center bg-[var(--primary-color)]/10">

            <p class="text-sm text-gray-500 mb-4">
                Need a faster response?
            </p>

            <a href="https://wa.me/+2348071903819" target="_blank" class="text-[var(--primary-color)] font-bold flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
